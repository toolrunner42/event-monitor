name: Wiesn Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      - name: Save state
        run: |
          git config user.name "Wiesn Monitor"
          git config user.email "bot@wiesn-monitor"
          git add state.json
          git diff --staged --quiet || git commit -m "Update state"
          git push origin HEAD:main || echo "Push failed, will retry next run"
